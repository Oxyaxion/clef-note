name: Release

on:
  push:
    tags:
      - 'v*'

# Deny all permissions by default; grant only what each job needs.
permissions: {}

jobs:
  build-linux:
    name: Linux x86_64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: '22'

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE: ''
          APP_VERSION: ${{ github.ref_name }}
        run: npm ci && npm run build

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: linux-cargo-${{ hashFiles('backend/Cargo.lock') }}

      - name: Set version in Cargo.toml
        working-directory: backend
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          sed -i "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" Cargo.toml

      - name: Build backend
        working-directory: backend
        run: cargo build --release

      - name: Stage binary
        run: cp backend/target/release/clef-note clef-note-linux-x86_64

      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228  # v3.0.2
        with:
          files: clef-note-linux-x86_64
          generate_release_notes: true

  build-freebsd:
    name: FreeBSD x86_64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Build in FreeBSD VM
        uses: vmactions/freebsd-vm@77ed28d336d03fe19a3f4f7266c1d2c4714dd79d  # v1
        with:
          usesh: true
          prepare: pkg install -y rust node npm
          run: |
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            sed -i '' "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" backend/Cargo.toml
            cd frontend
            npm ci
            VITE_API_BASE='' APP_VERSION="${{ github.ref_name }}" npm run build
            cd ../backend
            cargo build --release

      - name: Stage binary
        run: cp backend/target/release/clef-note clef-note-freebsd-x86_64

      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228  # v3.0.2
        with:
          files: clef-note-freebsd-x86_64
          generate_release_notes: true
