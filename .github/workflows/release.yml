name: Release

on:
  push:
    tags:
      - 'v*'

# Deny all permissions by default; grant only what each job needs.
permissions: {}

jobs:
  build-linux:
    name: Linux x86_64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE: ''
          APP_VERSION: ${{ github.ref_name }}
        run: npm ci && npm run build

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: linux-cargo-${{ hashFiles('backend/Cargo.lock') }}

      - name: Set version in Cargo.toml
        working-directory: backend
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          sed -i "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" Cargo.toml

      - name: Build backend
        working-directory: backend
        run: cargo build --release

      - name: Stage binary
        run: cp backend/target/release/clef-note clef-note-linux-x86_64

      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          files: clef-note-linux-x86_64
          generate_release_notes: true

  build-freebsd:
    name: FreeBSD x86_64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Build in FreeBSD VM
        uses: vmactions/freebsd-vm@a6de9343ef5747433d9c25784c90e84998b9d69a  # v1
        with:
          usesh: true
          prepare: pkg install -y rust node npm
          run: |
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            sed -i '' "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" backend/Cargo.toml
            cd frontend
            npm ci
            VITE_API_BASE='' APP_VERSION="${{ github.ref_name }}" npm run build
            cd ../backend
            cargo build --release

      - name: Stage binary
        run: cp backend/target/release/clef-note clef-note-freebsd-x86_64

      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          files: clef-note-freebsd-x86_64
          generate_release_notes: true
