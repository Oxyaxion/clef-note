name: Release

on:
  push:
    tags:
      - 'v*'

# Deny all permissions by default; grant only what each job needs.
permissions: {}

jobs:
  build-linux:
    name: Linux x86_64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE: ''
          APP_VERSION: ${{ github.ref_name }}
        run: npm ci && npm run build

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8  # v6.0.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: linux-cargo-${{ hashFiles('backend/Cargo.lock') }}

      - name: Set version in Cargo.toml
        working-directory: backend
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          sed -i "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" Cargo.toml

      - name: Build backend
        working-directory: backend
        run: cargo build --release

      - name: Stage binary
        run: cp backend/target/release/clef-note clef-note-linux-x86_64

      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          files: clef-note-linux-x86_64
          generate_release_notes: true

  build-freebsd:
    name: FreeBSD x86_64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Build in FreeBSD VM
        uses: vmactions/freebsd-vm@b84ab5559b5a1bb4b8ee2737d2506a16e1737636  # v1
        with:
          usesh: true
          prepare: pkg install -y rust node npm
          run: |
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            sed -i '' "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" backend/Cargo.toml
            cd frontend
            npm ci
            VITE_API_BASE='' APP_VERSION="${{ github.ref_name }}" npm run build
            cd ../backend
            cargo build --release

      - name: Stage binary
        run: cp backend/target/release/clef-note clef-note-freebsd-x86_64

      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          files: clef-note-freebsd-x86_64
          generate_release_notes: true
